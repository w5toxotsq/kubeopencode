{{- if and .Values.server.enabled .Values.server.portForward.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kubeopencode.fullname" . }}-port-forward
  namespace: {{ include "kubeopencode.namespace" . }}
  labels:
    {{- include "kubeopencode.server.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kubeopencode.fullname" . }}-port-forward
subjects:
  {{- range .Values.server.portForward.subjects }}
  - kind: {{ .kind }}
    name: {{ .name }}
    {{- if .namespace }}
    namespace: {{ .namespace }}
    {{- end }}
  {{- end }}
{{- end }}
