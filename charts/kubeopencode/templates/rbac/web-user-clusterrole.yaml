{{- if .Values.server.enabled }}
# ClusterRole for KubeOpenCode Web UI users.
# Bind this to users/groups per namespace via RoleBinding to grant
# access to the web dashboard, task management, log viewing, and terminal.
#
# Example RoleBinding:
#   apiVersion: rbac.authorization.k8s.io/v1
#   kind: RoleBinding
#   metadata:
#     name: team-kubeopencode-user
#     namespace: team-namespace
#   subjects:
#     - kind: Group
#       name: my-team
#       apiGroup: rbac.authorization.k8s.io
#   roleRef:
#     kind: ClusterRole
#     name: {{ include "kubeopencode.fullname" . }}-web-user
#     apiGroup: rbac.authorization.k8s.io
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubeopencode.fullname" . }}-web-user
  labels:
    {{- include "kubeopencode.labels" . | nindent 4 }}
    app.kubernetes.io/component: web-user
rules:
# View tasks, crontasks, agents, and templates
- apiGroups: ["kubeopencode.io"]
  resources: ["tasks", "crontasks", "agents", "agenttemplates"]
  verbs: ["get", "list", "watch"]
# Create, stop, and delete tasks
- apiGroups: ["kubeopencode.io"]
  resources: ["tasks"]
  verbs: ["create", "delete", "patch"]
# Manage crontasks (create, update, delete, trigger, suspend/resume)
- apiGroups: ["kubeopencode.io"]
  resources: ["crontasks"]
  verbs: ["create", "update", "delete", "patch"]
# Manage agents (create, delete, suspend/resume)
- apiGroups: ["kubeopencode.io"]
  resources: ["agents"]
  verbs: ["create", "update", "delete"]
# Delete agent templates
- apiGroups: ["kubeopencode.io"]
  resources: ["agenttemplates"]
  verbs: ["delete"]
# View pod status (required by task detail page)
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
# Stream task logs (required by log viewer)
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
# Web terminal access (required to exec into agent server pods)
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
{{- end }}
