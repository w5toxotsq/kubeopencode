              skills:
                description: |-
                  Skills defines external skill sources for Agents derived from this template.
                  Skills are SKILL.md files in Git repositories. Agents can override this list.
                items:
                  description: "SkillSource defines a source of skills for an agent.\nEach
                    SkillSource references a Git repository containing SKILL.md files\norganized
                    as one-folder-per-skill.\n\nThe controller clones the repository,
                    optionally filters specific skill directories,\nand auto-injects
                    the mount paths into OpenCode's skills.paths configuration.\nOpenCode
                    then discovers and loads the skills automatically.\n\nExample:\n\n\tskills:\n\t-
                    name: official-skills\n\t  git:\n\t    repository: https://github.com/anthropics/skills.git\n\t
                    \   ref: main\n\t    path: skills/\n\t    names:\n\t    - frontend-design\n\t
                    \   - webapp-testing"
                  properties:
                    git:
                      description: Git specifies a Git repository containing skills.
                      properties:
                        depth:
                          default: 1
                          description: |-
                            Depth specifies the clone depth for shallow cloning.
                            1 means shallow clone (fastest, default), 0 means full clone.
                          type: integer
                        names:
                          description: |-
                            Names selects specific skill directories under Path.
                            Each name corresponds to a skill folder name containing SKILL.md.
                            If omitted, ALL skills found under Path are included.
                            Each name must be a simple directory name (no path separators or ".." allowed).

                            Example: ["frontend-design", "webapp-testing"] selects only those two skills
                            from the repository, ignoring all others.
                          items:
                            maxLength: 253
                            minLength: 1
