---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: agenttemplates.kubeopencode.io
spec:
  group: kubeopencode.io
  names:
    kind: AgentTemplate
    listKind: AgentTemplateList
    plural: agenttemplates
    shortNames:
    - agt
    singular: agenttemplate
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.executorImage
      name: Image
      priority: 1
      type: string
    - jsonPath: .spec.workspaceDir
      name: WorkspaceDir
      priority: 1
      type: string
    - jsonPath: .spec.serviceAccountName
      name: ServiceAccount
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AgentTemplate defines a reusable base configuration for Agents.
          Teams can maintain a single AgentTemplate with shared settings (images, contexts,
          credentials, etc.) and individual users can create Agents that reference the
          template, inheriting its configuration while optionally overriding specific fields.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec defines the template configuration
            properties:
              agentImage:
                description: |-
                  AgentImage specifies the OpenCode init container image.
                  This image contains the OpenCode binary that gets copied to /tools volume.
                  If not specified, defaults to "quay.io/kubeopencode/kubeopencode-agent-opencode:latest".
                type: string
              attachImage:
                description: |-
                  AttachImage specifies the lightweight image used for --attach Pods.
                  If not specified, defaults to "quay.io/kubeopencode/kubeopencode-agent-attach:latest".
                type: string
              caBundle:
                description: CABundle configures custom CA certificates for TLS verification.
                properties:
                  configMapRef:
                    description: |-
                      ConfigMapRef references a ConfigMap containing PEM-encoded CA certificates.
                      Compatible with cert-manager trust-manager Bundle resources.
                    properties:
                      key:
                        description: |-
                          Key containing the PEM-encoded CA bundle.
                          Defaults to "ca-bundle.crt" for ConfigMapRef, "ca.crt" for SecretRef.
                        type: string
                      name:
                        description: Name of the ConfigMap or Secret.
                        type: string
                    required:
                    - name
                    type: object
                  secretRef:
                    description: SecretRef references a Secret containing PEM-encoded
                      CA certificates.
                    properties:
                      key:
                        description: |-
                          Key containing the PEM-encoded CA bundle.
                          Defaults to "ca-bundle.crt" for ConfigMapRef, "ca.crt" for SecretRef.
                        type: string
                      name:
                        description: Name of the ConfigMap or Secret.
                        type: string
                    required:
                    - name
                    type: object
                type: object
                x-kubernetes-validations:
                - message: either configMapRef or secretRef must be specified
                  rule: has(self.configMapRef) || has(self.secretRef)
                - message: only one of configMapRef or secretRef can be specified
                  rule: '!(has(self.configMapRef) && has(self.secretRef))'
              command:
                description: |-
                  Command specifies the entrypoint command for the agent container.
                  If not specified, defaults to:
                    ["sh", "-c", "/tools/opencode run \"$(cat ${WORKSPACE_DIR}/task.md)\""]
                items:
                  type: string
                type: array
              config:
                description: Config provides OpenCode configuration as a JSON string.
                type: string
              contexts:
                description: Contexts provides default contexts for all tasks using
                  Agents derived from this template.
                items:
                  description: |-
                    ContextItem defines context with content and mount path.
                    Used directly in Task/Agent specs to provide additional context for task execution.
                  properties:
                    configMap:
                      description: ConfigMap context (required when Type == "ConfigMap")
                      properties:
                        key:
                          description: |-
                            Key specifies a single key to mount as a file.
                            If not specified, all keys are mounted as files in the directory.
                          type: string
                        name:
                          description: Name of the ConfigMap
                          type: string
                        optional:
                          description: Optional specifies whether the ConfigMap must
                            exist.
                          type: boolean
                      required:
                      - name
                      type: object
                    description:
                      description: |-
                        Description provides human-readable documentation for this context.
                        This is purely for documentation purposes and does not affect behavior.
                        Useful for explaining why a context is included or what it provides.
                      type: string
                    fileMode:
                      description: |-
                        FileMode is the file permission mode for the mounted file (e.g., 0755 for executable scripts).
                        Only applicable when MountPath is specified.
                        If not specified, defaults to 0644.
                      format: int32
                      type: integer
                    git:
                      description: Git context (required when Type == "Git")
                      properties:
                        depth:
                          default: 1
                          description: |-
                            Depth specifies the clone depth for shallow cloning.
                            1 means shallow clone (fastest), 0 means full clone.
                            Defaults to 1 for efficiency.
                          type: integer
                        path:
                          description: |-
                            Path is the path within the repository to mount.
                            Can be a file or directory. If empty, the entire repository is mounted.

                            Note on .git directory:
                              - If Path is empty (entire repo): The mounted directory WILL contain .git/
                              - If Path is specified (subdirectory): The mounted directory will NOT contain .git/

                            Example: ".claude/", "docs/guide.md"
                          type: string
                        recurseSubmodules:
                          description: |-
                            RecurseSubmodules enables recursive cloning of Git submodules.
                            If true, submodules are initialized and cloned along with the repository.
                            Defaults to false (submodules are not cloned).
                          type: boolean
                        ref:
                          default: HEAD
                          description: |-
                            Ref is the Git reference (branch, tag, or commit SHA).
                            Defaults to "HEAD" if not specified.
                          type: string
                        repository:
                          description: |-
                            Repository is the Git repository URL.
                            Example: "https://github.com/org/contexts"
                          type: string
                        secretRef:
                          description: |-
                            SecretRef references a Secret containing Git credentials.
                            The Secret should contain one of:
                              - "username" + "password": For HTTPS token-based auth (password can be a PAT)
                              - "ssh-privatekey": For SSH key-based auth
                            If not specified, anonymous clone is attempted.
                          properties:
                            name:
                              description: Name of the Secret containing Git credentials.
                              type: string
                          required:
                          - name
                          type: object
                        sync:
                          description: |-
                            Sync configures automatic synchronization of the Git repository.
                            Only effective for Agent contexts (ignored for Task contexts).
                            When enabled, the repository content is kept up-to-date with the remote.
                          properties:
                            enabled:
                              description: |-
                                Enabled enables periodic sync of the Git repository.
                                When true, a sidecar container (HotReload) or controller polling (Rollout)
                                is used to keep the Git content up-to-date.
                              type: boolean
                            interval:
                              description: |-
                                Interval is the polling interval for checking remote changes.
                                Default: "5m".
                              type: string
                            policy:
                              default: HotReload
                              description: |-
                                Policy determines how changes are applied.
                                HotReload (default): sidecar pulls changes in-place, no Pod restart.
                                Rollout: controller detects changes and triggers Deployment rolling update.
                              enum:
                              - HotReload
                              - Rollout
                              type: string
                          type: object
                      required:
                      - repository
                      type: object
                    mountPath:
                      description: |-
                        MountPath specifies where this context should be mounted in the agent pod.

                        Path resolution follows Tekton conventions:
                        - Absolute paths (starting with "/") are used as-is
                        - Relative paths (NOT starting with "/") are prefixed with the agent's workspaceDir

                        If not specified, the content is appended to task.md with XML tags.

                        Note: For Runtime context type, MountPath is ignored - content is always
                        appended to task.md.
                      type: string
                    name:
                      description: |-
                        Name is an optional identifier for this context.
                        Used for:
                          - Logging and debugging (clearer error messages)
                          - XML tag generation (appears in task.md context blocks)
                          - Context deduplication (same-named contexts can override each other)
                        If not specified, a default name is generated based on the context type and index.
                      type: string
                    runtime:
                      description: |-
                        Runtime context (optional when Type == "Runtime")
                        Enables KubeOpenCode platform awareness. The controller injects a system prompt
                        that explains the runtime environment to the agent.
                      type: object
                    text:
                      description: |-
                        Text is the text content (required when Type == "Text").
                        Contains text content defined directly in YAML.
                      type: string
                    type:
                      description: 'Type of context source: Text, ConfigMap, Git,
                        Runtime, Secret, or URL'
                      enum:
                      - Text
                      - ConfigMap
                      - Git
                      - Runtime
                      - URL
                      type: string
                    url:
                      description: |-
                        URL context (required when Type == "URL")
                        Fetches content from a remote HTTP/HTTPS URL at task execution time.
                      properties:
                        headers:
                          additionalProperties:
                            type: string
                          description: |-
                            Headers specifies HTTP headers to include in the request.
                            Useful for authentication tokens or custom headers.
                            Example: {"Authorization": "Bearer token123"}
                          type: object
                        insecureSkipTLSVerify:
                          description: |-
                            InsecureSkipTLSVerify skips TLS certificate verification.
                            WARNING: This is insecure and should only be used for testing
                            or with self-signed certificates in controlled environments.
                          type: boolean
                        secretRef:
                          description: |-
                            SecretRef references a Secret containing authentication credentials.
                            The Secret can contain:
                              - "token": Used as Bearer token in Authorization header
                              - "username" + "password": Used for HTTP Basic authentication
                            If both Headers["Authorization"] and SecretRef are specified,
                            SecretRef takes precedence.
                          properties:
                            name:
                              description: Name of the Secret containing authentication
                                credentials.
                              type: string
                          required:
                          - name
                          type: object
                        source:
                          description: |-
                            Source is the URL to fetch content from.
                            Must be a valid HTTP or HTTPS URL.
                          type: string
                        timeout:
                          default: 30
                          description: |-
                            Timeout specifies the request timeout in seconds.
                            Defaults to 30 seconds if not specified.
                          format: int32
                          type: integer
                      required:
                      - source
                      type: object
                  required:
                  - type
                  type: object
                  x-kubernetes-validations:
                  - message: text is required when type is Text
                    rule: self.type != 'Text' || has(self.text)
                  - message: configMap is required when type is ConfigMap
                    rule: self.type != 'ConfigMap' || has(self.configMap)
                  - message: git is required when type is Git
                    rule: self.type != 'Git' || has(self.git)
                  - message: url is required when type is URL
                    rule: self.type != 'URL' || has(self.url)
                  - message: mountPath is required for Git context type
                    rule: self.type != 'Git' || has(self.mountPath)
                type: array
              credentials:
                description: Credentials defines secrets that should be available
                  to the agent.
                items:
                  description: |-
                    Credential represents a secret that should be available to the agent.
                    Each credential references a Kubernetes Secret and specifies how to expose it.

                    Mounting behavior depends on whether SecretRef.Key is specified:

                    1. No Key specified + No MountPath: entire Secret as environment variables
                    2. No Key specified + MountPath: entire Secret as directory (each key becomes a file)
                    3. Key specified + Env: single key as environment variable
                    4. Key specified + MountPath: single key as file
                  properties:
                    env:
                      description: |-
                        Env specifies the environment variable name to expose the secret value.
                        Only applicable when SecretRef.Key is specified.
                        If specified, the secret key's value is set as this environment variable.
                        Example: "GITHUB_TOKEN" for GitHub API access
                      type: string
                    fileMode:
                      description: |-
                        FileMode specifies the permission mode for mounted files.
                        Only applicable when MountPath is specified.
                        Defaults to 0600 (read/write for owner only) for security.
                        Use 0400 for read-only files like SSH keys.
                      format: int32
                      type: integer
                    mountPath:
                      description: |-
                        MountPath specifies where to mount the secret.
                        - If SecretRef.Key is specified: mounts the single key's value as a file at this path.
                          Example: "/home/agent/.ssh/id_rsa" for SSH keys
                        - If SecretRef.Key is not specified: mounts the entire Secret as a directory,
                          where each key in the Secret becomes a file in the directory.
                          Example: "/etc/ssl/certs" for a Secret containing ca.crt, client.crt, client.key
                      type: string
                    name:
                      description: Name is a descriptive name for this credential
                        (for documentation purposes).
                      type: string
                    secretRef:
                      description: SecretRef references the Kubernetes Secret containing
                        the credential.
                      properties:
                        key:
                          description: |-
                            Key of the Secret to select.
                            If not specified, the entire Secret is used:
                            - With MountPath: mounted as a directory (each key becomes a file)
                            - Without MountPath: all keys become environment variables
                            When Key is omitted, the Env field on the Credential is ignored.
                          type: string
                        name:
                          description: Name of the Secret.
                          type: string
                      required:
                      - name
                      type: object
                  required:
                  - name
                  - secretRef
                  type: object
                  x-kubernetes-validations:
                  - message: env can only be set when secretRef.key is specified
                    rule: '!has(self.env) || has(self.secretRef.key)'
                type: array
              executorImage:
                description: |-
                  ExecutorImage specifies the main worker container image for task execution.
                  If not specified, defaults to "quay.io/kubeopencode/kubeopencode-agent-devbox:latest".
                type: string
              imagePullSecrets:
                description: |-
                  ImagePullSecrets is a list of references to secrets for pulling container images
                  from private registries.
                items:
                  description: |-
                    LocalObjectReference contains enough information to let you locate the
                    referenced object inside the same namespace.
                  properties:
                    name:
                      default: ""
                      description: |-
                        Name of the referent.
                        This field is effectively required, but due to backwards compatibility is
                        allowed to be empty. Instances of this type with an empty value here are
                        almost certainly wrong.
                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                      type: string
                  type: object
                  x-kubernetes-map-type: atomic
                type: array
              maxConcurrentTasks:
                description: |-
                  MaxConcurrentTasks provides a default concurrency limit for Agents derived from this template.
                  Agents can override this value in their own spec.
                format: int32
                type: integer
              podSpec:
                description: PodSpec defines advanced Pod configuration for agent
                  pods.
                properties:
                  labels:
                    additionalProperties:
                      type: string
                    description: |-
                      Labels defines additional labels to add to the agent pod.
                      These labels are applied to the Job's pod template and enable integration with:
                        - NetworkPolicy podSelector for network isolation
                        - Service selector for service discovery
                        - PodMonitor/ServiceMonitor for Prometheus monitoring
                        - Any other label-based pod selection

                      Example: To make pods match a NetworkPolicy with podSelector:
                        labels:
                          network-policy: agent-restricted
                    type: object
                  podSecurityContext:
                    description: |-
                      PodSecurityContext defines pod-level security attributes and common container settings.
                      Applied to the Pod spec directly (affects all containers).

                      Example:
                        podSecurityContext:
                          runAsUser: 1000
                          runAsGroup: 1000
                          fsGroup: 1000
                    properties:
                      appArmorProfile:
                        description: |-
                          appArmorProfile is the AppArmor options to use by the containers in this pod.
                          Note that this field cannot be set when spec.os.name is windows.
                        properties:
                          localhostProfile:
                            description: |-
                              localhostProfile indicates a profile loaded on the node that should be used.
                              The profile must be preconfigured on the node to work.
                              Must match the loaded name of the profile.
                              Must be set if and only if type is "Localhost".
                            type: string
                          type:
                            description: |-
                              type indicates which kind of AppArmor profile will be applied.
                              Valid options are:
                                Localhost - a profile pre-loaded on the node.
                                RuntimeDefault - the container runtime's default profile.
                                Unconfined - no AppArmor enforcement.
                            type: string
                        required:
                        - type
                        type: object
                      fsGroup:
                        description: |-
                          A special supplemental group that applies to all containers in a pod.
                          Some volume types allow the Kubelet to change the ownership of that volume
                          to be owned by the pod:

                          1. The owning GID will be the FSGroup
                          2. The setgid bit is set (new files created in the volume will be owned by FSGroup)
                          3. The permission bits are OR'd with rw-rw----

                          If unset, the Kubelet will not modify the ownership and permissions of any volume.
                          Note that this field cannot be set when spec.os.name is windows.
                        format: int64
                        type: integer
                      fsGroupChangePolicy:
                        description: |-
                          fsGroupChangePolicy defines behavior of changing ownership and permission of the volume
                          before being exposed inside Pod. This field will only apply to
                          volume types which support fsGroup based ownership(and permissions).
                          It will have no effect on ephemeral volume types such as: secret, configmaps
                          and emptydir.
                          Valid values are "OnRootMismatch" and "Always". If not specified, "Always" is used.
                          Note that this field cannot be set when spec.os.name is windows.
                        type: string
                      runAsGroup:
                        description: |-
                          The GID to run the entrypoint of the container process.
                          Uses runtime default if unset.
                          May also be set in SecurityContext.  If set in both SecurityContext and
                          PodSecurityContext, the value specified in SecurityContext takes precedence
                          for that container.
                          Note that this field cannot be set when spec.os.name is windows.
                        format: int64
                        type: integer
                      runAsNonRoot:
                        description: |-
                          Indicates that the container must run as a non-root user.
                          If true, the Kubelet will validate the image at runtime to ensure that it
                          does not run as UID 0 (root) and fail to start the container if it does.
                          If unset or false, no such validation will be performed.
                          May also be set in SecurityContext.  If set in both SecurityContext and
                          PodSecurityContext, the value specified in SecurityContext takes precedence.
                        type: boolean
                      runAsUser:
                        description: |-
                          The UID to run the entrypoint of the container process.
                          Defaults to user specified in image metadata if unspecified.
                          May also be set in SecurityContext.  If set in both SecurityContext and
                          PodSecurityContext, the value specified in SecurityContext takes precedence
                          for that container.
                          Note that this field cannot be set when spec.os.name is windows.
                        format: int64
                        type: integer
                      seLinuxChangePolicy:
                        description: |-
                          seLinuxChangePolicy defines how the container's SELinux label is applied to all volumes used by the Pod.
                          It has no effect on nodes that do not support SELinux or to volumes does not support SELinux.
                          Valid values are "MountOption" and "Recursive".

                          "Recursive" means relabeling of all files on all Pod volumes by the container runtime.
                          This may be slow for large volumes, but allows mixing privileged and unprivileged Pods sharing the same volume on the same node.

                          "MountOption" mounts all eligible Pod volumes with `-o context` mount option.
                          This requires all Pods that share the same volume to use the same SELinux label.
                          It is not possible to share the same volume among privileged and unprivileged Pods.
                          Eligible volumes are in-tree FibreChannel and iSCSI volumes, and all CSI volumes
                          whose CSI driver announces SELinux support by setting spec.seLinuxMount: true in their
                          CSIDriver instance. Other volumes are always re-labelled recursively.
                          "MountOption" value is allowed only when SELinuxMount feature gate is enabled.

                          If not specified and SELinuxMount feature gate is enabled, "MountOption" is used.
                          If not specified and SELinuxMount feature gate is disabled, "MountOption" is used for ReadWriteOncePod volumes
                          and "Recursive" for all other volumes.

                          This field affects only Pods that have SELinux label set, either in PodSecurityContext or in SecurityContext of all containers.

                          All Pods that use the same volume should use the same seLinuxChangePolicy, otherwise some pods can get stuck in ContainerCreating state.
                          Note that this field cannot be set when spec.os.name is windows.
                        type: string
                      seLinuxOptions:
                        description: |-
                          The SELinux context to be applied to all containers.
                          If unspecified, the container runtime will allocate a random SELinux context for each
                          container.  May also be set in SecurityContext.  If set in
                          both SecurityContext and PodSecurityContext, the value specified in SecurityContext
                          takes precedence for that container.
                          Note that this field cannot be set when spec.os.name is windows.
                        properties:
                          level:
                            description: Level is SELinux level label that applies
                              to the container.
                            type: string
                          role:
                            description: Role is a SELinux role label that applies
                              to the container.
                            type: string
                          type:
                            description: Type is a SELinux type label that applies
                              to the container.
                            type: string
                          user:
                            description: User is a SELinux user label that applies
                              to the container.
                            type: string
                        type: object
                      seccompProfile:
                        description: |-
                          The seccomp options to use by the containers in this pod.
                          Note that this field cannot be set when spec.os.name is windows.
                        properties:
                          localhostProfile:
                            description: |-
                              localhostProfile indicates a profile defined in a file on the node should be used.
                              The profile must be preconfigured on the node to work.
                              Must be a descending path, relative to the kubelet's configured seccomp profile location.
                              Must be set if type is "Localhost". Must NOT be set for any other type.
                            type: string
                          type:
                            description: |-
                              type indicates which kind of seccomp profile will be applied.
                              Valid options are:

                              Localhost - a profile defined in a file on the node should be used.
                              RuntimeDefault - the container runtime default profile should be used.
                              Unconfined - no profile should be applied.
                            type: string
                        required:
                        - type
                        type: object
                      supplementalGroups:
                        description: |-
                          A list of groups applied to the first process run in each container, in
                          addition to the container's primary GID and fsGroup (if specified).  If
                          the SupplementalGroupsPolicy feature is enabled, the
                          supplementalGroupsPolicy field determines whether these are in addition
                          to or instead of any group memberships defined in the container image.
                          If unspecified, no additional groups are added, though group memberships
                          defined in the container image may still be used, depending on the
                          supplementalGroupsPolicy field.
                          Note that this field cannot be set when spec.os.name is windows.
                        items:
                          format: int64
                          type: integer
                        type: array
                        x-kubernetes-list-type: atomic
                      supplementalGroupsPolicy:
                        description: |-
                          Defines how supplemental groups of the first container processes are calculated.
                          Valid values are "Merge" and "Strict". If not specified, "Merge" is used.
                          (Alpha) Using the field requires the SupplementalGroupsPolicy feature gate to be enabled
                          and the container runtime must implement support for this feature.
                          Note that this field cannot be set when spec.os.name is windows.
                        type: string
                      sysctls:
                        description: |-
                          Sysctls hold a list of namespaced sysctls used for the pod. Pods with unsupported
                          sysctls (by the container runtime) might fail to launch.
                          Note that this field cannot be set when spec.os.name is windows.
                        items:
                          description: Sysctl defines a kernel parameter to be set
                          properties:
                            name:
                              description: Name of a property to set
                              type: string
                            value:
                              description: Value of a property to set
                              type: string
                          required:
                          - name
                          - value
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                      windowsOptions:
                        description: |-
                          The Windows specific settings applied to all containers.
                          If unspecified, the options within a container's SecurityContext will be used.
                          If set in both SecurityContext and PodSecurityContext, the value specified in SecurityContext takes precedence.
                          Note that this field cannot be set when spec.os.name is linux.
                        properties:
                          gmsaCredentialSpec:
                            description: |-
                              GMSACredentialSpec is where the GMSA admission webhook
                              (https://github.com/kubernetes-sigs/windows-gmsa) inlines the contents of the
                              GMSA credential spec named by the GMSACredentialSpecName field.
                            type: string
                          gmsaCredentialSpecName:
                            description: GMSACredentialSpecName is the name of the
                              GMSA credential spec to use.
                            type: string
                          hostProcess:
                            description: |-
                              HostProcess determines if a container should be run as a 'Host Process' container.
                              All of a Pod's containers must have the same effective HostProcess value
                              (it is not allowed to have a mix of HostProcess containers and non-HostProcess containers).
                              In addition, if HostProcess is true then HostNetwork must also be set to true.
                            type: boolean
                          runAsUserName:
                            description: |-
                              The UserName in Windows to run the entrypoint of the container process.
                              Defaults to the user specified in image metadata if unspecified.
                              May also be set in PodSecurityContext. If set in both SecurityContext and
                              PodSecurityContext, the value specified in SecurityContext takes precedence.
                            type: string
                        type: object
                    type: object
                  resources:
                    description: |-
                      Resources specifies the compute resources (CPU, memory) for the agent container.
                      This applies to both the Agent's Deployment and Task Pods.
                      If not specified, uses the cluster's default resource limits.

                      Example:
                        resources:
                          requests:
                            memory: "512Mi"
                            cpu: "500m"
                          limits:
                            memory: "2Gi"
                            cpu: "2"
                    properties:
                      claims:
                        description: |-
                          Claims lists the names of resources, defined in spec.resourceClaims,
                          that are used by this container.

                          This field depends on the
                          DynamicResourceAllocation feature gate.

                          This field is immutable. It can only be set for containers.
                        items:
                          description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                          properties:
                            name:
                              description: |-
                                Name must match the name of one entry in pod.spec.resourceClaims of
                                the Pod where this field is used. It makes that resource available
                                inside a container.
                              type: string
                            request:
