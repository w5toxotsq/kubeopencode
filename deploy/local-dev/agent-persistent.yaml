# Persistent Agent for local testing
#
# Agent with session and workspace persistence — data survives pod restarts.
# Includes standby for automatic suspend/resume lifecycle management.
#
# Features demonstrated:
#   - templateRef: inherits shared config from AgentTemplate
#   - persistence: session + workspace data survive pod restarts
#   - standby: auto-suspends after 30 minutes idle, auto-resumes on new Task
#   - maxConcurrentTasks: limits concurrent task execution
#
apiVersion: kubeopencode.io/v1alpha1
kind: Agent
metadata:
  name: persistent-agent
spec:
  # Inherit shared configuration from AgentTemplate
  templateRef:
    name: local-dev-base
  profile: "Persistent agent with session history and workspace storage"
  # Required fields (also in template, but required on Agent)
  executorImage: quay.io/kubeopencode/kubeopencode-agent-devbox:latest
  workspaceDir: /workspace
  serviceAccountName: kubeopencode-agent
  # Server port (default: 4096)
  port: 4096
  # Session persistence: conversation history survives pod restarts
  persistence:
    sessions:
      size: "1Gi"
    # Workspace persistence: git repos and modified files survive pod restarts
    workspace:
      size: "5Gi"
  # Standby: auto-suspend after 30 minutes idle, auto-resume when new Task arrives
  standby:
    idleTimeout: "30m"
  # Limit concurrent tasks for local testing
  maxConcurrentTasks: 3
  # Optional: Mount API credentials for paid models (not needed for free big-pickle model)
  # credentials:
  #   - name: opencode
  #     secretRef:
  #       name: opencode-credentials
