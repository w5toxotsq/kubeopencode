# AgentTemplate for local testing
#
# This template defines shared configuration for all local-dev Agents.
# Agents reference this template via spec.templateRef, inheriting images,
# credentials, workspace settings, and service account configuration.
#
apiVersion: kubeopencode.io/v1alpha1
kind: AgentTemplate
metadata:
  name: local-dev-base
spec:
  # OpenCode init container image
  agentImage: quay.io/kubeopencode/kubeopencode-agent-opencode:latest
  # Executor container image
  executorImage: quay.io/kubeopencode/kubeopencode-agent-devbox:latest
  # Attach image for agentRef Task Pods
  attachImage: quay.io/kubeopencode/kubeopencode-agent-attach:latest
  # Working directory
  workspaceDir: /workspace
  # ServiceAccount for RBAC
  serviceAccountName: kubeopencode-agent
  # Shared OpenCode configuration
  # Uses the free opencode/big-pickle model — no API key required.
  # To use a different model (e.g., Anthropic, Google), update the model fields
  # and create a Secret with your API key (see secrets.yaml.example).
  config: |
    {
      "$schema": "https://opencode.ai/config.json",
      "model": "opencode/big-pickle",
      "small_model": "opencode/big-pickle",
      "share": "disabled",
      "autoupdate": false
    }
