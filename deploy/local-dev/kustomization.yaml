# Copyright Contributors to the KubeOpenCode project
# Kustomization for local development environment
#
# Quick Start (uses free opencode/big-pickle model — no API key needed):
#   kubectl apply -k deploy/local-dev/
#
# For paid models (Anthropic, Google, etc.):
#   1. cp deploy/local-dev/secrets.yaml.example deploy/local-dev/secrets.yaml
#   2. Edit secrets.yaml with your real API key
#   3. kubectl apply -f deploy/local-dev/secrets.yaml -n test
#   4. Update agenttemplate.yaml model + uncomment credentials in agent YAMLs
#   5. kubectl apply -k deploy/local-dev/
#
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: test

resources:
  - namespace.yaml
  - rbac.yaml
  - agenttemplate.yaml
  - agent-persistent.yaml
  - agent-dev.yaml
